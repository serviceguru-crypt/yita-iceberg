name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Main branch commit SHA or release tag to deploy
        required: true
      run_live_smoke:
        description: Run authenticated smoke checks after deployment
        required: true
        default: false
        type: boolean

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: npm ci
      - run: npm --prefix functions ci
      - run: npx playwright install --with-deps chromium
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run functions:typecheck
      - run: npm run functions:lint
      - run: npm run functions:build
      - run: npm run rules:test
      - run: npm run functions:test
      - run: npm run test:e2e
      - name: Verify production configuration
        run: npm run verify:production
        env:
          APP_ENV: production
          APP_BASE_URL: https://yita-iceberg--yita-iceberg.us-east4.hosted.app
          FIREBASE_PROJECT_ID: yita-iceberg
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: yita-iceberg
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyD4ZKF5iemf_DQ49PbbAGSiJ9PFVM_5elk
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: yita-iceberg.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: yita-iceberg.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "464641042034"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:464641042034:web:7f5b1e37482078465244eb
          NEXT_PUBLIC_FIREBASE_APP_CHECK_SITE_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_CHECK_SITE_KEY }}
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: "false"
          NEXT_PUBLIC_ENABLE_APP_CHECK: "true"
          NEXT_PUBLIC_APP_CHECK_DEBUG_TOKEN: ""
          ENABLE_APP_CHECK_ENFORCEMENT: "true"
          ENABLE_REPORT_SUMMARY_REBUILD: "true"
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: yita-iceberg
          workload_identity_provider: projects/464641042034/locations/global/workloadIdentityPools/github-actions/providers/yita-github
          service_account: yita-github-deployer@yita-iceberg.iam.gserviceaccount.com
      - name: Deploy rules and indexes
        run: |
          npx firebase-tools deploy --only firestore:rules,storage --project yita
          npx firebase-tools deploy --only firestore:indexes --project yita
      - name: Deploy functions
        run: npx firebase-tools deploy --only functions --project yita
      - name: Verify backups and alerts
        run: npm run verify:cloud-ops
        env:
          FIREBASE_PROJECT_ID: yita-iceberg
      - name: Live authenticated smoke test
        if: ${{ inputs.run_live_smoke }}
        run: npm run smoke:test
        env:
          APP_ENV: production
          APP_BASE_URL: https://yita-iceberg--yita-iceberg.us-east4.hosted.app
          FIREBASE_PROJECT_ID: yita-iceberg
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyD4ZKF5iemf_DQ49PbbAGSiJ9PFVM_5elk
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: yita-iceberg.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: yita-iceberg.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "464641042034"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:464641042034:web:7f5b1e37482078465244eb
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          SMOKE_TEST_ALLOW_PRODUCTION: "true"
          SMOKE_TEST_PRODUCTION_CONFIRMATION: RUN_SMOKE_TESTS_AGAINST_PRODUCTION
