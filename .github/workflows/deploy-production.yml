name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Main branch commit SHA or release tag to deploy
        required: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm --prefix functions ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run functions:typecheck
      - run: npm run functions:lint
      - run: npm run functions:build
      - run: npm run rules:test
      - run: npm run functions:test
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - name: Deploy rules and indexes
        run: |
          npx firebase-tools deploy --only firestore:rules,storage --project production
          npx firebase-tools deploy --only firestore:indexes --project production
      - name: Deploy functions
        run: npx firebase-tools deploy --only functions --project production
      - name: Smoke dry run
        run: npm run smoke:test -- --dry-run
        env:
          APP_ENV: production
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
          SMOKE_TEST_ALLOW_PRODUCTION: "true"
          SMOKE_TEST_PRODUCTION_CONFIRMATION: RUN_SMOKE_TESTS_AGAINST_PRODUCTION
